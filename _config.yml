title: "The Intelligence Age: A History of AI"
tagline: "From ancient automata to modern neural networks — the story of thinking machines"
description: "Explore the complete history of artificial intelligence, from medieval mechanical minds to today's deep learning revolution. Discover the key breakthroughs, visionary thinkers, and cultural moments that shaped AI."
baseurl: ""
url: "https://aag1091-alt.github.io/AI-History-Blog"

author:
  name: AI History Blog

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

highlighter: rouge
color_theme: dark

permalink: /:year/:month/:day/:title/

collections:
  people:
    output: true
    permalink: /people/:slug/
  eras:
    output: true
    permalink: /eras/:slug/

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - "*.sh"
