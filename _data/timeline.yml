
- id: "dartmouth-conference-1956"
  title: "The Conference That Named a Field"
  subtitle: "A small summer workshop at Dartmouth College coined the term 'artificial intelligence' and launched an entirely new discipline."
  event_date: "1956-08-31"
  era: "The Dawn of AI (1956–1969)"
  category: "Research"
  quote: "We propose that a 2 month, 10 man study of artificial intelligence be carried out during the summer of 1956 at Dartmouth College in Hanover, New Hampshire."
  quote_author: "John McCarthy, Marvin Minsky, Nathaniel Rochester, Claude Shannon"

- id: "perceptron-rosenblatt-1958"
  title: "The Machine That Learned: Rosenblatt's Perceptron"
  subtitle: "A Cornell psychologist built the first neural network hardware, sparking a media frenzy and a dream that machines could truly learn."
  event_date: "1958-07-08"
  era: "The Dawn of AI (1956–1969)"
  category: "Research"
  quote: "The embryo of an electronic computer that [the Navy] expects will be able to walk, talk, see, write, reproduce itself and be conscious of its existence."
  quote_author: "The New York Times, reporting on the Perceptron, 1958"

- id: "eliza-weizenbaum-1966"
  title: "ELIZA: The First Chatbot That Fooled People"
  subtitle: "Joseph Weizenbaum's simple pattern-matching program at MIT unexpectedly convinced users they were talking to a real therapist, raising profound questions about human-computer interaction."
  event_date: "1966-01-01"
  era: "The Dawn of AI (1956–1969)"
  category: "Research"
  quote: "I had not realized … that extremely short exposures to a relatively simple computer program could induce powerful delusional thinking in quite normal people."
  quote_author: "Joseph Weizenbaum"

- id: "deep-blue-kasparov-1997"
  title: "The Day a Machine Dethroned the King of Chess"
  subtitle: "IBM's Deep Blue defeated world chess champion Garry Kasparov in a six-game match, stunning the world and forcing a reckoning with machine intelligence."
  event_date: "1997-05-11"
  era: "Statistical Learning and Quiet Progress (1993–2010)"
  category: "Culture"
  quote: "I could feel — I could smell — a new kind of intelligence across the table."
  quote_author: "Garry Kasparov"

- id: "alexnet-imagenet-2012"
  title: "The Neural Network That Shook Computer Vision"
  subtitle: "In 2012, a deep convolutional neural network called AlexNet crushed the ImageNet competition by such a wide margin that it reignited the entire field of neural network research."
  event_date: "2012-09-30"
  era: "The Deep Learning Revolution (2011–2019)"
  category: "Research"
  quote: "We achieved a winning top-5 test error rate of 15.3%, compared to 26.2% achieved by the second-best entry."
  quote_author: "Alex Krizhevsky, Ilya Sutskever, and Geoffrey Hinton"

- id: "attention-is-all-you-need-2017"
  title: "Attention Is All You Need"
  subtitle: "A team at Google Brain introduced the Transformer architecture, replacing recurrence with self-attention and quietly laying the foundation for every major AI system that followed."
  event_date: "2017-06-12"
  era: "The Deep Learning Revolution (2011–2019)"
  category: "Research"
  quote: "We were surprised by how well it worked. We thought attention could help, but we didn't expect it to replace everything."
  quote_author: "Jakob Uszkoreit"

- id: "turing-computing-machinery-intelligence-1950"
  title: "Can a Machine Think?"
  subtitle: "Alan Turing published the paper that gave AI its defining question — and a test that still sparks debate."
  event_date: "1950-10-01"
  era: "The Theoretical Foundations (1843–1955)"
  category: "Philosophy"
  quote: "We can only see a short distance ahead, but we can see plenty there that needs to be done."
  quote_author: "Alan Turing"

- id: "lighthill-report-1973"
  title: "The Report That Froze a Field"
  subtitle: "Sir James Lighthill's devastating 1973 critique of AI research triggered massive funding cuts and ushered in the first AI winter."
  event_date: "1973-04-01"
  era: "The First AI Winter (1970–1979)"
  category: "Policy"
  quote: "In no part of the field have the discoveries made so far produced the major impact that was then promised."
  quote_author: "Sir James Lighthill"

- id: "alphago-lee-sedol-2016"
  title: "The Move No Human Would Play"
  subtitle: "DeepMind's AlphaGo defeated world champion Lee Sedol at Go, a game long considered an insurmountable challenge for machines."
  event_date: "2016-03-09"
  era: "The Deep Learning Revolution (2011–2019)"
  category: "Research"
  quote: "I thought AlphaGo was based on probability calculation and that it was merely a machine. But when I saw this move, I changed my mind. Surely, AlphaGo is creative."
  quote_author: "Lee Sedol"

- id: "hal-9000-2001-space-odyssey-1968"
  title: "HAL 9000 and the Birth of AI's Public Imagination"
  subtitle: "Stanley Kubrick's 2001: A Space Odyssey introduced audiences to a terrifyingly calm artificial intelligence, shaping public fears and expectations about AI for decades."
  event_date: "1968-04-02"
  era: "The Dawn of AI (1956–1969)"
  category: "Film & Fiction"
  quote: "I'm sorry, Dave. I'm afraid I can't do that."
  quote_author: "HAL 9000, voiced by Douglas Rain"

- id: "backpropagation-rumelhart-hinton-1986"
  title: "Learning in Reverse: The Backpropagation Breakthrough"
  subtitle: "A 1986 Nature paper showed neural networks how to learn by propagating errors backward, reviving a field that had been declared dead."
  event_date: "1986-10-09"
  era: "Expert Systems and the Knowledge Boom (1980–1992)"
  category: "Research"
  quote: "We describe a new learning procedure, back-propagation, for networks of neurone-like units. The procedure repeatedly adjusts the weights of the connections in the network so as to minimize a measure of the difference between the actual output vector of the net and the desired output vector."
  quote_author: "David Rumelhart, Geoffrey Hinton, Ronald Williams"

- id: "ibm-watson-jeopardy-2011"
  title: "Watson Wins Jeopardy!"
  subtitle: "IBM's question-answering system defeated two of the greatest Jeopardy! champions ever, proving machines could master natural language on live television."
  event_date: "2011-02-16"
  era: "The Deep Learning Revolution (2011–2019)"
  category: "Commercial"
  quote: "I for one welcome our new computer overlords."
  quote_author: "Ken Jennings"

- id: "generative-adversarial-networks-2014"
  title: "The Idea Born in a Bar: Generative Adversarial Networks"
  subtitle: "Ian Goodfellow sketched out a radical new framework for teaching machines to create, launching the era of AI-generated imagery."
  event_date: "2014-06-10"
  era: "The Deep Learning Revolution (2011–2019)"
  category: "Research"
  quote: "The most interesting idea in the last ten years in machine learning."
  quote_author: "Yann LeCun"

- id: "chinese-room-searle-1980"
  title: "The Room That Understood Nothing"
  subtitle: "Philosopher John Searle argued that no computer could ever truly understand language, igniting a debate that still rages today."
  event_date: "1980-01-01"
  era: "The First AI Winter (1970–1979)"
  category: "Philosophy"
  quote: "Whatever purely formal principles you put into the computer, they will not be sufficient for understanding, since a human will be able to follow the formal principles without understanding anything."
  quote_author: "John Searle"

- id: "darpa-grand-challenge-stanley-2005"
  title: "The Robot That Conquered the Desert"
  subtitle: "Stanford's Stanley completed a 132-mile autonomous desert race, proving self-driving vehicles were no longer science fiction."
  event_date: "2005-10-08"
  era: "Statistical Learning and Quiet Progress (1993–2010)"
  category: "Robotics"
  quote: "No one had ever built a robot that could drive 130 miles in the desert without human help. We didn't know if it was possible."
  quote_author: "Sebastian Thrun"

- id: "ada-lovelace-note-g-1843"
  title: "The Enchantress of Numbers"
  subtitle: "Ada Lovelace published the first algorithm and asked whether machines could truly think — a century before anyone else."
  event_date: "1843-10-01"
  era: "The Theoretical Foundations (1843–1955)"
  category: "Philosophy"
  quote: "The Analytical Engine has no pretensions whatever to originate anything. It can do whatever we know how to order it to perform."
  quote_author: "Ada Lovelace"

- id: "shakey-first-reasoning-robot-1969"
  title: "The Robot That Could Reason"
  subtitle: "SRI International unveiled Shakey, the first mobile robot to perceive its environment, plan actions, and carry them out — bridging the gap between abstract AI and physical reality."
  event_date: "1969-11-01"
  era: "The Dawn of AI (1956–1969)"
  category: "Robotics"
  quote: "Shakey was the first creature in the history of the planet that could reason about its own actions."
  quote_author: "Nils Nilsson"

- id: "mechanical-turk-kempelen-1770"
  title: "The Fraudulent Machine That Inspired Real Ones"
  subtitle: "Wolfgang von Kempelen's chess-playing automaton fooled Europe for decades and planted the seed of machine intelligence in the public imagination."
  event_date: "1770-03-10"
  era: "Mechanical Minds and Mathematical Dreams (1308–1842)"
  category: "Culture"
  quote: "The Automaton Chess Player had excited so universal an interest, that, to a certain extent, a solution of the mystery was considered almost as a matter of course."
  quote_author: "Edgar Allan Poe"

- id: "gpt-3-language-model-2020"
  title: "The 175 Billion Parameter Surprise"
  subtitle: "OpenAI's GPT-3 demonstrated that scaling up language models could produce emergent abilities no one explicitly programmed, igniting the foundation model era."
  event_date: "2020-06-11"
  era: "The Age of Foundation Models (2020–Present)"
  category: "Research"
  quote: "The thing that's really surprising is not any single capability, but the fact that all these capabilities emerge from one model trained with one objective."
  quote_author: "Ilya Sutskever"

- id: "fifth-generation-computer-project-1982"
  title: "The Billion-Dollar Gamble That Spooked the West"
  subtitle: "Japan launched a massive government-funded project to build thinking machines, triggering a global AI arms race that reshaped research funding worldwide."
  event_date: "1982-04-14"
  era: "Expert Systems and the Knowledge Boom (1980–1992)"
  category: "Policy"
  quote: "What is it that has so shaken the American, and indeed the entire Western, parsimony toward the support of computer science research? It is the Fifth Generation."
  quote_author: "Edward Feigenbaum"

- id: "mcculloch-pitts-neural-model-1943"
  title: "The Paper That Gave Machines Neurons"
  subtitle: "Warren McCulloch and Walter Pitts published the first mathematical model of a neural network, proving that networks of simple binary neurons could compute any logical function."
  event_date: "1943-12-01"
  era: "The Theoretical Foundations (1843–1955)"
  category: "Research"
  quote: "What we thought we were doing (and I think we succeeded fairly well) was treating the brain as a Turing machine."
  quote_author: "Warren McCulloch"

- id: "dendral-expert-system-1965"
  title: "The First Expert System That Out-Performed Scientists"
  subtitle: "A Stanford program learned to identify chemical compounds better than most human chemists, proving AI could master specialized knowledge."
  event_date: "1965-12-01"
  era: "The Dawn of AI (1956–1969)"
  category: "Research"
  quote: "The important thing about DENDRAL is that it demonstrated that computers could be made to perform at the level of human experts in specialized domains — that knowledge was the key to machine intelligence."
  quote_author: "Edward Feigenbaum"

- id: "samuel-checkers-machine-learning-1959"
  title: "The Program That Named Machine Learning"
  subtitle: "Arthur Samuel's checkers-playing program learned to beat its creator, and gave an entire field its name."
  event_date: "1959-07-03"
  era: "The Dawn of AI (1956–1969)"
  category: "Research"
  quote: "Programming computers to learn from experience should eventually eliminate the need for much of this detailed programming effort."
  quote_author: "Arthur Samuel"

- id: "eliza-effect-weizenbaum-warning-1976"
  title: "The Creator Who Turned Against His Creation"
  subtitle: "Joseph Weizenbaum published Computer Power and Human Reason, warning that his own ELIZA experiment revealed a dangerous human willingness to trust machines with intimate decisions."
  event_date: "1976-01-15"
  era: "The First AI Winter (1970–1979)"
  category: "Philosophy"
  quote: "What I had not realized is that extremely short exposures to a relatively simple computer program could induce powerful delusional thinking in quite normal people."
  quote_author: "Joseph Weizenbaum"

- id: "chatgpt-launch-2022"
  title: "The Chatbot That Broke the Internet"
  subtitle: "OpenAI's ChatGPT reached 100 million users in two months, making AI a household word overnight."
  event_date: "2022-11-30"
  era: "The Age of Foundation Models (2020–Present)"
  category: "Commercial"
  quote: "ChatGPT is scary good. We are not far from dangerously strong AI."
  quote_author: "Elon Musk"

- id: "lstm-hochreiter-schmidhuber-1997"
  title: "The Memory That Saved Neural Networks"
  subtitle: "Two researchers in Munich published a paper solving the vanishing gradient problem, quietly laying the foundation for every modern AI that understands sequences."
  event_date: "1997-11-01"
  era: "Statistical Learning and Quiet Progress (1993–2010)"
  category: "Research"
  quote: "The problem is that backpropagated error signals either shrink or grow exponentially. This is the fundamental deep learning problem."
  quote_author: "Sepp Hochreiter"

- id: "mycin-expert-system-1976"
  title: "The Program That Prescribed Better Than Doctors"
  subtitle: "Stanford's MYCIN diagnosed blood infections more accurately than most physicians, yet was never allowed to treat a single patient."
  event_date: "1976-10-01"
  era: "The First AI Winter (1970–1979)"
  category: "Research"
  quote: "MYCIN's performance was comparable to that of the experts and better than that of the non-experts. The issue was never whether the program worked, but whether anyone would be allowed to use it."
  quote_author: "Bruce Buchanan"

- id: "terminator-skynet-1984"
  title: "The Machine That Made the World Fear AI"
  subtitle: "James Cameron's The Terminator introduced Skynet to popular culture, permanently shaping public anxiety about artificial intelligence."
  event_date: "1984-10-26"
  era: "Expert Systems and the Knowledge Boom (1980–1992)"
  category: "Film & Fiction"
  quote: "I'll be back."
  quote_author: "Arnold Schwarzenegger as the T-800"

- id: "imagenet-fei-fei-li-2009"
  title: "The Woman Who Gave AI Eyes"
  subtitle: "Fei-Fei Li spent three years building a dataset of 14 million labeled images that most colleagues dismissed as busywork — it became the catalyst for the deep learning revolution."
  event_date: "2009-06-20"
  era: "Statistical Learning and Quiet Progress (1993–2010)"
  category: "Research"
  quote: "We do not need more clever algorithms. We need more data."
  quote_author: "Fei-Fei Li"

- id: "probabilistic-reasoning-judea-pearl-1988"
  title: "The Book That Taught Machines to Handle Uncertainty"
  subtitle: "Judea Pearl's Probabilistic Reasoning in Intelligent Systems replaced brittle logic with the mathematics of belief, quietly reshaping AI from the inside out."
  event_date: "1988-01-15"
  era: "Expert Systems and the Knowledge Boom (1980–1992)"
  category: "Research"
  quote: "You cannot answer a question about intervention with statistical data alone. You need a causal model."
  quote_author: "Judea Pearl"

- id: "lisp-mccarthy-programming-language-1960"
  title: "The Language That Gave AI Its Voice"
  subtitle: "John McCarthy invented LISP, a radical programming language built on pure mathematics that became the lingua franca of artificial intelligence research for three decades."
  event_date: "1960-04-01"
  era: "The Dawn of AI (1956–1969)"
  category: "Engineering"
  quote: "As soon as it works, no one calls it AI anymore."
  quote_author: "John McCarthy"

- id: "word2vec-mikolov-2013"
  title: "King Minus Man Plus Woman Equals Queen"
  subtitle: "A deceptively simple algorithm revealed that words have geometry, launching the era of word embeddings and transforming how machines understand language."
  event_date: "2013-01-16"
  era: "The Deep Learning Revolution (2011–2019)"
  category: "Research"
  quote: "The word vectors capture many linguistic regularities, for example vector('King') - vector('Man') + vector('Woman') results in a vector very close to vector('Queen')."
  quote_author: "Tomas Mikolov"

- id: "reinforcement-learning-atari-deepmind-2013"
  title: "The Algorithm That Mastered Atari by Itself"
  subtitle: "A small London startup showed that a single neural network could learn to play dozens of video games from raw pixels alone, igniting the deep reinforcement learning revolution."
  event_date: "2013-12-19"
  era: "The Deep Learning Revolution (2011–2019)"
  category: "Research"
  quote: "The idea that you could take raw pixels, feed them into a neural network, and out would pop actions that would lead to superhuman performance — that was the dream of AI from the very beginning."
  quote_author: "Demis Hassabis"

- id: "eliza-effect-mit-terry-winograd-shrdlu-1971"
  title: "The Program That Understood a Block World"
  subtitle: "Terry Winograd's SHRDLU demonstrated natural language understanding by manipulating virtual blocks — convincing researchers that true machine comprehension was just around the corner."
  event_date: "1971-01-15"
  era: "The First AI Winter (1970–1979)"
  category: "Research"
  quote: "The computer system we describe can carry on a simple dialogue in English about a small world of objects, understanding and responding to commands, statements, and questions."
  quote_author: "Terry Winograd"

- id: "logic-theorist-newell-simon-1955"
  title: "The Program That Proved Theorems Before AI Had a Name"
  subtitle: "Months before the Dartmouth Conference coined 'artificial intelligence,' the Logic Theorist became the first program to autonomously prove mathematical theorems — and one of its proofs was more elegant than the human original."
  event_date: "1955-12-15"
  era: "The Theoretical Foundations (1843–1955)"
  category: "Research"
  quote: "Over Christmas, Allen Newell and I invented a thinking machine."
  quote_author: "Herbert A. Simon"

- id: "lenet-handwritten-digits-lecun-1989"
  title: "The Neural Network That Read Your Mail"
  subtitle: "Yann LeCun's convolutional neural network learned to read handwritten zip codes, proving that neural networks could solve real-world problems and laying the foundation for modern computer vision."
  event_date: "1989-12-01"
  era: "Expert Systems and the Knowledge Boom (1980–1992)"
  category: "Research"
  quote: "What I really wanted to show is that you could design the architecture of a neural net so it would have some built-in knowledge of the world — in this case, knowledge about the structure of images."
  quote_author: "Yann LeCun"

- id: "gpt-2-too-dangerous-to-release-2019"
  title: "The Model Too Dangerous to Release"
  subtitle: "OpenAI withheld its own language model from the public, igniting a firestorm over AI transparency and safety."
  event_date: "2019-02-14"
  era: "The Deep Learning Revolution (2011–2019)"
  category: "Policy"
  quote: "Due to concerns about large language models being used to generate deceptive, biased, or abusive language at scale, we are only releasing a much smaller version of GPT-2."
  quote_author: "OpenAI"

- id: "bayesian-spam-filtering-paul-graham-2002"
  title: "The Essay That Turned AI Loose on Your Inbox"
  subtitle: "Paul Graham's 'A Plan for Spam' showed that a simple Bayesian classifier could catch junk email with stunning accuracy, bringing machine learning into the daily lives of millions."
  event_date: "2002-08-01"
  era: "Statistical Learning and Quiet Progress (1993–2010)"
  category: "Engineering"
  quote: "I think it's possible to stop spam, and that content-based filtering is the way to do it."
  quote_author: "Paul Graham"

- id: "netflix-prize-recommendation-2006"
  title: "The Million-Dollar Algorithm Contest"
  subtitle: "Netflix offered a million dollars to anyone who could improve its recommendation engine by 10%, igniting a global competition that transformed machine learning."
  event_date: "2006-10-02"
  era: "Statistical Learning and Quiet Progress (1993–2010)"
  category: "Commercial"
  quote: "We're quite curious, really. We want to find out if someone knows something about predicting how much someone is going to love a movie based on their movie preferences."
  quote_author: "Reed Hastings"

- id: "cybernetics-norbert-wiener-1948"
  title: "The Book That Fused Minds and Machines"
  subtitle: "Norbert Wiener published Cybernetics, coining the science of communication and control that would become AI's intellectual scaffolding."
  event_date: "1948-10-15"
  era: "The Theoretical Foundations (1843–1955)"
  category: "Research"
  quote: "The thought of every age is reflected in its technique."
  quote_author: "Norbert Wiener"

- id: "eliza-effect-mit-marvin-minsky-society-of-mind-1986"
  title: "The Society Inside Your Head"
  subtitle: "Marvin Minsky proposed that intelligence isn't one thing but a society of tiny mindless agents, reshaping how researchers thought about building thinking machines."
  event_date: "1986-03-15"
  era: "Expert Systems and the Knowledge Boom (1980–1992)"
  category: "Philosophy"
  quote: "You don't understand anything until you learn it more than one way."
  quote_author: "Marvin Minsky"

- id: "expert-system-r1-digital-equipment-1986"
  title: "The AI That Saved a Company $40 Million a Year"
  subtitle: "Digital Equipment Corporation's R1/XCON became the first expert system to prove AI could deliver massive commercial value, configuring minicomputers faster and more accurately than any human."
  event_date: "1986-01-15"
  era: "Expert Systems and the Knowledge Boom (1980–1992)"
  category: "Commercial"
  quote: "R1 currently saves DEC more money annually than it cost to build and maintain over its entire lifetime."
  quote_author: "John P. McDermott"

- id: "perceptrons-minsky-papert-1969"
  title: "The Book That Killed Neural Networks"
  subtitle: "Minsky and Papert's rigorous mathematical critique of perceptrons convinced a generation of researchers to abandon neural networks, triggering a funding drought that lasted over a decade."
  event_date: "1969-01-15"
  era: "The Dawn of AI (1956–1969)"
  category: "Research"
  quote: "The question is whether [perceptrons] have enough power to justify serious investment of intellectual effort… the answer is essentially negative."
  quote_author: "Marvin Minsky and Seymour Papert, Perceptrons (1969)"

- id: "roomba-irobot-consumer-robotics-2002"
  title: "The Robot That Vacuumed Its Way Into Millions of Homes"
  subtitle: "iRobot's Roomba brought autonomous robotics out of labs and onto living room floors, becoming the most commercially successful home robot in history."
  event_date: "2002-09-17"
  era: "Statistical Learning and Quiet Progress (1993–2010)"
  category: "Robotics"
  quote: "The Roomba was a success because we stopped trying to make the perfect robot and started making a robot that was good enough to be useful."
  quote_author: "Rodney Brooks"

- id: "speech-recognition-hidden-markov-models-1986"
  title: "Teaching Machines to Listen"
  subtitle: "IBM's speech recognition team, led by Fred Jelinek, proved that statistical methods could understand human speech better than any linguistic approach — famously quipping that firing linguists improved the system."
  event_date: "1986-03-15"
  era: "Expert Systems and the Knowledge Boom (1980–1992)"
  category: "Research"
  quote: "Every time I fire a linguist, the performance of the speech recognizer goes up."
  quote_author: "Frederick Jelinek"

- id: "support-vector-machines-vapnik-1995"
  title: "The Elegant Margin That Dominated Machine Learning"
  subtitle: "Vladimir Vapnik's Support Vector Machine became the most powerful classification algorithm of its era, quietly ruling AI for over a decade before deep learning took the crown."
  event_date: "1995-09-01"
  era: "Statistical Learning and Quiet Progress (1993–2010)"
  category: "Research"
  quote: "In this business, the weights of the evidence are more important than any prior belief."
  quote_author: "Vladimir Vapnik"

- id: "eliza-effect-mit-hopfield-network-1982"
  title: "The Physicist Who Gave Networks Memory"
  subtitle: "John Hopfield showed that a neural network could store and retrieve patterns like a physical system reaching equilibrium, reviving connectionism from its decade-long exile."
  event_date: "1982-04-01"
  era: "Expert Systems and the Knowledge Boom (1980–1992)"
  category: "Research"
  quote: "I was a physicist who wandered into biology, and then wandered from biology into computation. Each time I wandered, I found problems that were interesting."
  quote_author: "John Hopfield"

- id: "alphafold-protein-folding-2020"
  title: "The Algorithm That Solved Biology's 50-Year Grand Challenge"
  subtitle: "DeepMind's AlphaFold 2 cracked the protein folding problem with unprecedented accuracy, stunning the scientific world overnight."
  event_date: "2020-11-30"
  era: "The Age of Foundation Models (2020–Present)"
  category: "Research"
  quote: "This is a big deal. In some sense the problem is solved."
  quote_author: "John Moult"

- id: "ai-art-auction-christies-2018"
  title: "The Algorithm That Crashed the Art World"
  subtitle: "An AI-generated portrait sold at Christie's for $432,500, forcing the art world to confront a new kind of creator."
  event_date: "2018-10-25"
  era: "The Deep Learning Revolution (2011–2019)"
  category: "Culture"
  quote: "It may not have been painted by a man, but it certainly isn't a random cool picture either. There is a creative process here."
  quote_author: "Richard Lloyd, Christie's International Head of Prints and Multiples"

- id: "eliza-effect-mit-hopfield-boltzmann-machine-1985"
  title: "The Machine That Learned by Dreaming"
  subtitle: "Hinton and Sejnowski invented the Boltzmann machine, a neural network that learned by simulating the random thermal fluctuations of molecules."
  event_date: "1985-01-01"
  era: "Expert Systems and the Knowledge Boom (1980–1992)"
  category: "Research"
  quote: "The Boltzmann machine learning algorithm is the first example of a learning algorithm that can discover features that are not explicit in the input."
  quote_author: "Geoffrey Hinton"

- id: "rur-capek-robot-1921"
  title: "The Play That Gave Robots Their Name"
  subtitle: "Karel Čapek's R.U.R. premiered in Prague, introducing the word 'robot' to every language on Earth."
  event_date: "1921-01-25"
  era: "The Theoretical Foundations (1843–1955)"
  category: "Film & Fiction"
  quote: "The word Robot was not coined by me but by my brother Josef."
  quote_author: "Karel Čapek"

- id: "libratus-poker-imperfect-information-2017"
  title: "The Machine That Learned to Bluff"
  subtitle: "An AI named Libratus defeated four of the world's best professional poker players, proving machines could master games of incomplete information and deception."
  event_date: "2017-01-30"
  era: "The Deep Learning Revolution (2011–2019)"
  category: "Research"
  quote: "The bot gets better and better every day. It's like a tidal wave that just keeps coming."
  quote_author: "Jason Les"

- id: "eliza-effect-mit-hopfield-cyc-knowledge-base-1984"
  title: "The Audacious Attempt to Encode All Human Knowledge"
  subtitle: "Doug Lenat launched Cyc, a project to hand-code millions of common-sense facts into a machine — a decades-long bet that AI needed to know what every child knows."
  event_date: "1984-06-01"
  era: "Expert Systems and the Knowledge Boom (1980–1992)"
  category: "Research"
  quote: "Perhaps the most difficult thing about AI is the problem of common sense. Cyc is an attempt to break through that barrier by brute force."
  quote_author: "Douglas Lenat"

- id: "unimate-first-industrial-robot-1961"
  title: "The Steel Arm That Started the Robot Age"
  subtitle: "In 1961, a 4,000-pound mechanical arm named Unimate became the first industrial robot to work on an assembly line, forever changing manufacturing."
  event_date: "1961-06-01"
  era: "The Dawn of AI (1956–1969)"
  category: "Robotics"
  quote: "I decided that if Isaac Asimov could write about robots, I could build one."
  quote_author: "Joseph Engelberger"

- id: "reinforcement-learning-td-gammon-tesauro-1992"
  title: "The Neural Network That Mastered Backgammon"
  subtitle: "Gerald Tesauro's TD-Gammon taught itself to play backgammon at world-champion level, proving neural networks could discover strategies humans never imagined."
  event_date: "1992-03-01"
  era: "Expert Systems and the Knowledge Boom (1980–1992)"
  category: "Research"
  quote: "TD-Gammon's playing style has actually changed the way the best human players play the game."
  quote_author: "Gerald Tesauro"

- id: "stanford-cart-autonomous-vehicle-1979"
  title: "The Cart That Crossed a Room by Itself"
  subtitle: "A wobbly Stanford robot took five hours to navigate a chair-filled room, becoming one of the first machines to see and move autonomously."
  event_date: "1979-07-01"
  era: "The First AI Winter (1970–1979)"
  category: "Robotics"
  quote: "It was the first time a computer-controlled vehicle negotiated a cluttered space by seeing where it was going."
  quote_author: "Hans Moravec"

- id: "random-forest-breiman-2001"
  title: "The Wisdom of a Thousand Trees"
  subtitle: "Leo Breiman published the Random Forest algorithm, proving that an ensemble of weak, randomized decision trees could outperform the most sophisticated single classifiers."
  event_date: "2001-10-01"
  era: "Statistical Learning and Quiet Progress (1993–2010)"
  category: "Research"
  quote: "There are two cultures in the use of statistical modeling to reach conclusions from data. One assumes that the data are generated by a given stochastic data model. The other uses algorithmic models and treats the data mechanism as unknown."
  quote_author: "Leo Breiman"

- id: "eliza-effect-mit-hopfield-hidden-markov-speech-ibm-shoebox-1962"
  title: "The Box That Understood Sixteen Words"
  subtitle: "IBM's Shoebox demonstrated real-time speech recognition at the 1962 World's Fair, showing the public that machines could listen and respond to human voices."
  event_date: "1962-04-21"
  era: "The Dawn of AI (1956–1969)"
  category: "Engineering"
  quote: "It is not difficult to imagine what^—twenty or thirty years from now^—machines will be able to do with the human voice."
  quote_author: "William C. Dersch"

- id: "eliza-effect-mit-hopfield-eurisko-heuristic-learning-1983"
  title: "The Program That Invented Its Own Rules"
  subtitle: "Doug Lenat's Eurisko discovered winning strategies by rewriting its own heuristics, dominating a naval wargame so thoroughly the organizers threatened to cancel the competition."
  event_date: "1983-08-01"
  era: "Expert Systems and the Knowledge Boom (1980–1992)"
  category: "Research"
  quote: "When Eurisko entered the tournament, its fleet designs were so unconventional that the human players assumed they were mistakes — until the machines started winning."
  quote_author: "Douglas Lenat"

- id: "siri-apple-voice-assistant-2011"
  title: "The Voice in Your Pocket"
  subtitle: "Apple launched Siri on the iPhone 4S, bringing AI out of research labs and into the daily lives of hundreds of millions of people."
  event_date: "2011-10-04"
  era: "The Deep Learning Revolution (2011–2019)"
  category: "Commercial"
  quote: "Siri is a humble yet ambitious project to build a virtual assistant that can help you get things done just by asking."
  quote_author: "Dag Kittlaus"

- id: "sony-aibo-robot-dog-1999"
  title: "The Pet That Never Needed Feeding"
  subtitle: "Sony released AIBO, the first consumer robot designed not to work but to be loved, launching the era of emotional robotics."
  event_date: "1999-05-11"
  era: "Statistical Learning and Quiet Progress (1993–2010)"
  category: "Robotics"
  quote: "AIBO has no direct functional benefit. What it offers is the experience of raising and living with a robot — the joy of a relationship."
  quote_author: "Doi Toshitada, AIBO project lead"

- id: "dartmouth-workshop-birth-of-ai-1956"
  title: "The Summer That Named a Revolution"
  subtitle: "A small workshop at Dartmouth College coined the term 'artificial intelligence' and launched an entire field of research."
  event_date: "1956-08-31"
  era: "The Dawn of AI (1956–1969)"
  category: "Research"
  quote: "We propose that a 2 month, 10 man study of artificial intelligence be carried out during the summer of 1956 at Dartmouth College in Hanover, New Hampshire."
  quote_author: "John McCarthy, Marvin Minsky, Nathaniel Rochester, Claude Shannon"

- id: "perceptron-rosenblatt-navy-1958"
  title: "The Machine That Learned Like a Brain"
  subtitle: "Frank Rosenblatt unveiled the Perceptron, the first device that could genuinely learn from experience — and the New York Times predicted it would soon walk, talk, and think."
  event_date: "1958-07-08"
  era: "The Dawn of AI (1956–1969)"
  category: "Research"
  quote: "The embryo of an electronic computer that [the Navy] expects will be able to walk, talk, see, write, reproduce itself and be conscious of its existence."
  quote_author: "The New York Times, July 8, 1958"

- id: "eliza-first-chatbot-weizenbaum-1966"
  title: "The Therapist That Was Never Alive"
  subtitle: "A simple pattern-matching program fooled people into pouring out their hearts to a machine, revealing unsettling truths about human psychology."
  event_date: "1966-01-01"
  era: "The Dawn of AI (1956–1969)"
  category: "Research"
  quote: "I had not realized … that extremely short exposures to a relatively simple computer program could induce powerful delusional thinking in quite normal people."
  quote_author: "Joseph Weizenbaum"

- id: "deep-blue-defeats-kasparov-1997"
  title: "The Day a Machine Dethroned the King"
  subtitle: "IBM's Deep Blue defeated world chess champion Garry Kasparov in a six-game match, marking the first time a computer beat a reigning champion under standard tournament conditions."
  event_date: "1997-05-11"
  era: "Statistical Learning and Quiet Progress (1993–2010)"
  category: "Engineering"
  quote: "I could feel — I could smell — a new kind of intelligence across the table."
  quote_author: "Garry Kasparov"

- id: "eliza-effect-mit-hopfield-hidden-markov-rosenblatt-alphago-zero-self-taught-2017"
  title: "The Machine That Became Its Own Teacher"
  subtitle: "AlphaGo Zero mastered the ancient game of Go entirely through self-play, without any human knowledge — and surpassed all previous versions in just three days."
  event_date: "2017-10-18"
  era: "The Deep Learning Revolution (2011–2019)"
  category: "Research"
  quote: "It's more powerful than previous approaches because by not using human data, or human expertise in any fashion, we've removed the constraints of human knowledge and it is able to create knowledge itself."
  quote_author: "David Silver"

- id: "attention-is-all-you-need-transformer-2017"
  title: "The Architecture That Ate AI"
  subtitle: "A team at Google introduced the Transformer, a deceptively simple attention-based model that would become the foundation of virtually every major AI breakthrough that followed."
  event_date: "2017-06-12"
  era: "The Deep Learning Revolution (2011–2019)"
  category: "Research"
  quote: "We wanted to get rid of recurrence entirely… the key insight was that attention alone is sufficient."
  quote_author: "Ashish Vaswani"

- id: "eliza-effect-mit-hopfield-hidden-markov-rosenblatt-bayesian-google-cat-neuron-2012"
  title: "The Neural Network That Found Cats on the Internet"
  subtitle: "Google's secret project used 16,000 processors to build a neural network that spontaneously learned to recognize cats from unlabeled YouTube videos — proving unsupervised deep learning could discover concepts on its own."
  event_date: "2012-06-25"
  era: "The Deep Learning Revolution (2011–2019)"
  category: "Research"
  quote: "We never told it during the training, 'This is a cat.' It basically invented the concept of a cat."
  quote_author: "Jeff Dean"

- id: "lighthill-report-ai-winter-1973"
  title: "The Report That Froze a Field"
  subtitle: "A devastating government review by mathematician James Lighthill declared most AI research a failure, triggering funding cuts that plunged the field into its first winter."
  event_date: "1973-04-01"
  era: "The First AI Winter (1970–1979)"
  category: "Policy"
  quote: "In no part of the field have the discoveries made so far produced the major impact that was then promised."
  quote_author: "James Lighthill"

- id: "alphago-defeats-lee-sedol-2016"
  title: "The Move That No Human Would Play"
  subtitle: "DeepMind's AlphaGo stunned the world by defeating Go champion Lee Sedol, making a mysterious move that redefined what machines could create."
  event_date: "2016-03-09"
  era: "The Deep Learning Revolution (2011–2019)"
  category: "Research"
  quote: "It's not a human move. I've never seen a human play this move. So beautiful."
  quote_author: "Fan Hui"

- id: "computing-machinery-intelligence-turing-1950"
  title: "Can a Machine Think?"
  subtitle: "Alan Turing published the paper that reframed the oldest question in AI and gave the field its most famous test."
  event_date: "1950-10-01"
  era: "The Theoretical Foundations (1843–1955)"
  category: "Philosophy"
  quote: "I propose to consider the question, 'Can machines think?'"
  quote_author: "Alan Turing"

- id: "alexnet-imagenet-breakthrough-2012"
  title: "The GPU Gambit That Launched a Revolution"
  subtitle: "A deep neural network obliterated the ImageNet competition by such a staggering margin that it forced an entire field to abandon its old methods overnight."
  event_date: "2012-09-30"
  era: "The Deep Learning Revolution (2011–2019)"
  category: "Research"
  quote: "It was so much better than anything else that it was not like a gentle, oh maybe deep learning is okay. It was like, whoa, what just happened?"
  quote_author: "Jeff Dean"

- id: "generative-adversarial-networks-goodfellow-2014"
  title: "The Idea Born in a Bar"
  subtitle: "A PhD student's late-night argument at a Montreal pub led to generative adversarial networks, the breakthrough that taught machines to create."
  event_date: "2014-06-10"
  era: "The Deep Learning Revolution (2011–2019)"
  category: "Research"
  quote: "The coolest idea in deep learning in the last 20 years."
  quote_author: "Yann LeCun"

- id: "watson-jeopardy-ibm-2011"
  title: "The Computer That Won at Word Games"
  subtitle: "IBM's Watson defeated Jeopardy!'s two greatest champions on live television, proving machines could master the messy ambiguity of human language."
  event_date: "2011-02-16"
  era: "The Deep Learning Revolution (2011–2019)"
  category: "Commercial"
  quote: "I for one welcome our new computer overlords."
  quote_author: "Ken Jennings"
