
- id: "dartmouth-conference-1956"
  title: "The Conference That Named a Field"
  subtitle: "A small summer workshop at Dartmouth College coined the term 'artificial intelligence' and launched an entirely new discipline."
  event_date: "1956-08-31"
  era: "The Dawn of AI (1956–1969)"
  category: "Research"
  quote: "We propose that a 2 month, 10 man study of artificial intelligence be carried out during the summer of 1956 at Dartmouth College in Hanover, New Hampshire."
  quote_author: "John McCarthy, Marvin Minsky, Nathaniel Rochester, Claude Shannon"

- id: "perceptron-rosenblatt-1958"
  title: "The Machine That Learned: Rosenblatt's Perceptron"
  subtitle: "A Cornell psychologist built the first neural network hardware, sparking a media frenzy and a dream that machines could truly learn."
  event_date: "1958-07-08"
  era: "The Dawn of AI (1956–1969)"
  category: "Research"
  quote: "The embryo of an electronic computer that [the Navy] expects will be able to walk, talk, see, write, reproduce itself and be conscious of its existence."
  quote_author: "The New York Times, reporting on the Perceptron, 1958"

- id: "eliza-weizenbaum-1966"
  title: "ELIZA: The First Chatbot That Fooled People"
  subtitle: "Joseph Weizenbaum's simple pattern-matching program at MIT unexpectedly convinced users they were talking to a real therapist, raising profound questions about human-computer interaction."
  event_date: "1966-01-01"
  era: "The Dawn of AI (1956–1969)"
  category: "Research"
  quote: "I had not realized … that extremely short exposures to a relatively simple computer program could induce powerful delusional thinking in quite normal people."
  quote_author: "Joseph Weizenbaum"

- id: "deep-blue-kasparov-1997"
  title: "The Day a Machine Dethroned the King of Chess"
  subtitle: "IBM's Deep Blue defeated world chess champion Garry Kasparov in a six-game match, stunning the world and forcing a reckoning with machine intelligence."
  event_date: "1997-05-11"
  era: "Statistical Learning and Quiet Progress (1993–2010)"
  category: "Culture"
  quote: "I could feel — I could smell — a new kind of intelligence across the table."
  quote_author: "Garry Kasparov"

- id: "alexnet-imagenet-2012"
  title: "The Neural Network That Shook Computer Vision"
  subtitle: "In 2012, a deep convolutional neural network called AlexNet crushed the ImageNet competition by such a wide margin that it reignited the entire field of neural network research."
  event_date: "2012-09-30"
  era: "The Deep Learning Revolution (2011–2019)"
  category: "Research"
  quote: "We achieved a winning top-5 test error rate of 15.3%, compared to 26.2% achieved by the second-best entry."
  quote_author: "Alex Krizhevsky, Ilya Sutskever, and Geoffrey Hinton"

- id: "attention-is-all-you-need-2017"
  title: "Attention Is All You Need"
  subtitle: "A team at Google Brain introduced the Transformer architecture, replacing recurrence with self-attention and quietly laying the foundation for every major AI system that followed."
  event_date: "2017-06-12"
  era: "The Deep Learning Revolution (2011–2019)"
  category: "Research"
  quote: "We were surprised by how well it worked. We thought attention could help, but we didn't expect it to replace everything."
  quote_author: "Jakob Uszkoreit"

- id: "turing-computing-machinery-intelligence-1950"
  title: "Can a Machine Think?"
  subtitle: "Alan Turing published the paper that gave AI its defining question — and a test that still sparks debate."
  event_date: "1950-10-01"
  era: "The Theoretical Foundations (1843–1955)"
  category: "Philosophy"
  quote: "We can only see a short distance ahead, but we can see plenty there that needs to be done."
  quote_author: "Alan Turing"

- id: "lighthill-report-1973"
  title: "The Report That Froze a Field"
  subtitle: "Sir James Lighthill's devastating 1973 critique of AI research triggered massive funding cuts and ushered in the first AI winter."
  event_date: "1973-04-01"
  era: "The First AI Winter (1970–1979)"
  category: "Policy"
  quote: "In no part of the field have the discoveries made so far produced the major impact that was then promised."
  quote_author: "Sir James Lighthill"

- id: "alphago-lee-sedol-2016"
  title: "The Move No Human Would Play"
  subtitle: "DeepMind's AlphaGo defeated world champion Lee Sedol at Go, a game long considered an insurmountable challenge for machines."
  event_date: "2016-03-09"
  era: "The Deep Learning Revolution (2011–2019)"
  category: "Research"
  quote: "I thought AlphaGo was based on probability calculation and that it was merely a machine. But when I saw this move, I changed my mind. Surely, AlphaGo is creative."
  quote_author: "Lee Sedol"

- id: "hal-9000-2001-space-odyssey-1968"
  title: "HAL 9000 and the Birth of AI's Public Imagination"
  subtitle: "Stanley Kubrick's 2001: A Space Odyssey introduced audiences to a terrifyingly calm artificial intelligence, shaping public fears and expectations about AI for decades."
  event_date: "1968-04-02"
  era: "The Dawn of AI (1956–1969)"
  category: "Film & Fiction"
  quote: "I'm sorry, Dave. I'm afraid I can't do that."
  quote_author: "HAL 9000, voiced by Douglas Rain"
