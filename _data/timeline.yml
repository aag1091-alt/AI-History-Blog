
- id: "dartmouth-conference-1956"
  title: "The Conference That Named a Field"
  subtitle: "A small summer workshop at Dartmouth College coined the term 'artificial intelligence' and launched an entirely new discipline."
  event_date: "1956-08-31"
  era: "The Dawn of AI (1956–1969)"
  category: "Research"
  quote: "We propose that a 2 month, 10 man study of artificial intelligence be carried out during the summer of 1956 at Dartmouth College in Hanover, New Hampshire."
  quote_author: "John McCarthy, Marvin Minsky, Nathaniel Rochester, Claude Shannon"

- id: "perceptron-rosenblatt-1958"
  title: "The Machine That Learned: Rosenblatt's Perceptron"
  subtitle: "A Cornell psychologist built the first neural network hardware, sparking a media frenzy and a dream that machines could truly learn."
  event_date: "1958-07-08"
  era: "The Dawn of AI (1956–1969)"
  category: "Research"
  quote: "The embryo of an electronic computer that [the Navy] expects will be able to walk, talk, see, write, reproduce itself and be conscious of its existence."
